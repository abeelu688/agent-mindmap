name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            extension/package-lock.json
            webview/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install extension dependencies
        run: npm ci --prefix extension

      - name: Install webview dependencies
        run: npm ci --prefix webview

      # ── Strict checks (must pass) ────────────────────────────────────────
      - name: Verify version sync across package.json files
        run: npm run version:check

      - name: Verify no hardcoded concept segments
        run: npm run check:concept-nodes

      - name: Verify l10n bundle key consistency
        run: npm run check:l10n

      - name: Type check extension
        run: npm run typecheck:extension

      - name: Type check webview
        run: npm run typecheck:webview

      - name: Build
        run: npm run build

      - name: Run vitest
        run: npm run test:vitest

      - name: Run extension tests
        run: npm test

      # ── Soft checks (warnings only, do not block) ────────────────────────
      # Lint/format still carry pre-existing warnings — tracked incrementally.
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true

      - name: Format check (non-blocking)
        run: npm run format:check
        continue-on-error: true
