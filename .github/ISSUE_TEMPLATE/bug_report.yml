name: Bug report
description: Report something that is broken or behaves unexpectedly
title: "[bug]: "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. The more detail you give, the faster we can fix it.

        Before submitting, please check the [existing issues](https://github.com/your-org/agent-mindmap/issues) to avoid duplicates.

  - type: input
    id: extension-version
    attributes:
      label: Agent Mind Map version
      description: "Find this in the Extensions panel, or run `code --list-extensions --show-versions | grep agent-mindmap`."
      placeholder: "0.1.1"
    validations:
      required: true

  - type: dropdown
    id: editor
    attributes:
      label: Editor
      options:
        - VS Code
        - Cursor
        - Other (specify in description)
    validations:
      required: true

  - type: input
    id: editor-version
    attributes:
      label: Editor version
      description: "Help → About"
      placeholder: "1.95.0"
    validations:
      required: true

  - type: dropdown
    id: host
    attributes:
      label: Configured host (`agentMindmap.host`)
      options:
        - auto
        - cursor
        - claude-code
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - WSL
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug — what you expected vs. what actually happened.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: |
        Numbered steps. Include any commands you ran and what you saw.
      placeholder: |
        1. Run command "Agent Mind Map: Open Latest Session"
        2. ...
        3. Observe the error message "..."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Output channel logs
      description: |
        Open **View → Output → Agent Mind Map** and paste the relevant lines (last 50 or so).
        Strip anything sensitive (file paths, project names) before pasting.
      render: text

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: |
        Screenshots, transcripts (sanitized), or related issues. Drag images directly into the text box.
